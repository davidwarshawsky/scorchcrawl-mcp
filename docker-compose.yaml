name: scorchcrawl-mcp

# =============================================================================
# ScorchCrawl-MCP — Full-stack deployment (MCP server + core engine)
#
# Deploy engine only with: docker compose up -d
# Deploy engine + MCP for testing with: docker compose --profile mcp up -d
#
# Services:
#   - scorchcrawl-mcp:  MCP server for test-only / opt-in MCP access
#   - scorchcrawl-api:  Scraping engine (pulled from Docker Hub)
#   - searxng:          Privacy-preserving metasearch (default search provider)
#   - playwright:       Stealth browser service
#   - browserless:      Chrome browser pool
#   - redis:            Cache & queue backend
#   - rabbitmq:         Message broker
#   - postgres:         Job & metadata storage
# =============================================================================

x-common-service: &common-service
  image: ananymoususer/scorchcrawl:latest
  ulimits:
    nofile: { soft: 65535, hard: 65535 }
  networks: [backend]
  extra_hosts: ["host.docker.internal:host-gateway"]
  logging: &default-logging
    driver: "json-file"
    options: { max-size: "10m", max-file: "3", compress: "true" }

x-common-env: &common-env
  # --- Data stores ---
  REDIS_URL: ${REDIS_URL:-redis://redis:6379}
  REDIS_RATE_LIMIT_URL: ${REDIS_URL:-redis://redis:6379}
  POSTGRES_USER: ${POSTGRES_USER:-postgres}
  POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-postgres}"
  POSTGRES_DB: ${POSTGRES_DB:-postgres}
  POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
  POSTGRES_PORT: ${POSTGRES_PORT:-5432}
  # --- Browser backend ---
  PLAYWRIGHT_MICROSERVICE_URL: ${PLAYWRIGHT_MICROSERVICE_URL:-http://playwright:3000/scrape}
  # --- Concurrency ---
  NUM_WORKERS_PER_QUEUE: ${NUM_WORKERS_PER_QUEUE:-16}
  CRAWL_CONCURRENT_REQUESTS: ${CRAWL_CONCURRENT_REQUESTS:-20}
  MAX_CONCURRENT_JOBS: ${MAX_CONCURRENT_JOBS:-10}
  BROWSER_POOL_SIZE: ${BROWSER_POOL_SIZE:-10}
  # --- Scraping knobs ---
  SCRAPE_MAX_ATTEMPTS: ${SCRAPE_MAX_ATTEMPTS:-6}
  SCRAPE_MAX_PDF_PREFETCHES: ${SCRAPE_MAX_PDF_PREFETCHES:-2}
  SCRAPE_MAX_DOCUMENT_PREFETCHES: ${SCRAPE_MAX_DOCUMENT_PREFETCHES:-2}
  SCRAPE_MAX_FEATURE_TOGGLES: ${SCRAPE_MAX_FEATURE_TOGGLES:-3}
  USE_DB_AUTHENTICATION: ${USE_DB_AUTHENTICATION:-false}
  # --- Optional: Proxy ---
  PROXY_SERVER: ${PROXY_SERVER:-}
  PROXY_USERNAME: ${PROXY_USERNAME:-}
  PROXY_PASSWORD: ${PROXY_PASSWORD:-}
  # --- Search: SearXNG (anonymized metasearch, enabled by default) ---
  SEARXNG_ENDPOINT: ${SEARXNG_ENDPOINT:-http://searxng:8080}
  SEARXNG_ENGINES: ${SEARXNG_ENGINES:-}
  SEARXNG_CATEGORIES: ${SEARXNG_CATEGORIES:-}
  # --- Optional: LLM ---
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
  MODEL_NAME: ${MODEL_NAME:-}
  # --- Logging ---
  LOGGING_LEVEL: ${LOGGING_LEVEL:-info}

services:
  # ===========================================================================
  # ScorchCrawl MCP Server (the entry point for Copilot / MCP clients)
  # ===========================================================================
  scorchcrawl-mcp:
    profiles: ["mcp"]
    build:
      context: ./server
      dockerfile: Dockerfile
    environment:
      PORT: "3000"
      HOST: "0.0.0.0"
      HTTP_STREAMABLE_SERVER: "true"
      SCORCHCRAWL_API_URL: http://scorchcrawl-api:${INTERNAL_PORT:-3002}
      GITHUB_TOKEN: ${GITHUB_TOKEN}
      COPILOT_AGENT_MODELS: ${COPILOT_AGENT_MODELS:-gpt-4.1,gpt-4o,gpt-5-mini}
      COPILOT_AGENT_DEFAULT_MODEL: ${COPILOT_AGENT_DEFAULT_MODEL:-gpt-4.1}
      RATE_LIMIT_MAX_GLOBAL_CONCURRENCY: ${RATE_LIMIT_MAX_GLOBAL_CONCURRENCY:-10}
      RATE_LIMIT_MAX_PER_USER_CONCURRENCY: ${RATE_LIMIT_MAX_PER_USER_CONCURRENCY:-3}
    ports:
      - "${MCP_HOST:-127.0.0.1}:${MCP_PORT:-24787}:3000"
    depends_on:
      scorchcrawl-api: { condition: service_started }
    networks: [backend]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging: *default-logging

  # ===========================================================================
  # ScorchCrawl API (scraping engine)
  # ===========================================================================
  scorchcrawl-api:
    <<: *common-service
    container_name: scorchcrawl-api
    environment:
      <<: *common-env
      HOST: "0.0.0.0"
      PORT: ${INTERNAL_PORT:-3002}
      EXTRACT_WORKER_PORT: ${EXTRACT_WORKER_PORT:-3004}
      WORKER_PORT: ${WORKER_PORT:-3005}
    ports:
      - "${SCORCHCRAWL_HOST:-127.0.0.1}:${SCORCHCRAWL_PORT:-24786}:${INTERNAL_PORT:-3002}"
    depends_on:
      redis: { condition: service_started }
      postgres: { condition: service_started }
      rabbitmq: { condition: service_started }
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:${INTERNAL_PORT:-3002}/v1/api-docs"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ===========================================================================
  # Supporting Services
  # ===========================================================================

  playwright:
    image: ghcr.io/davidwarshawsky/playwright:main
    container_name: playwright
    environment:
      PORT: "3000"
      BROWSER_WS_ENDPOINT: ws://browserless:3000
      LOGGING_LEVEL: ${LOGGING_LEVEL:-info}
    ports:
      - "127.0.0.1:3000:3000"
    networks: [backend]
    restart: unless-stopped
    logging: *default-logging
    depends_on:
      - browserless

  browserless:
    image: ghcr.io/browserless/base:latest
    container_name: browserless
    environment:
      CONCURRENT: 10
      QUEUE_LENGTH: 100
      PREBOOT_CHROME: "true"
      CHROME_PATH: /usr/bin/chromium-browser
    networks: [backend]
    restart: unless-stopped
    logging: *default-logging

  redis:
    image: redis:7-alpine
    container_name: redis
    command: redis-server --maxmemory ${REDIS_MAX_MEMORY:-512mb} --maxmemory-policy allkeys-lru
    ports:
      - "127.0.0.1:6379:6379"
    networks: [backend]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging: *default-logging
    volumes:
      - redis-data:/data

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    ports:
      - "127.0.0.1:5672:5672"
      - "127.0.0.1:15672:15672"
    networks: [backend]
    restart: unless-stopped
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 30s
      timeout: 5s
      retries: 3
    logging: *default-logging
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
    ports:
      - "127.0.0.1:5432:5432"
    networks: [backend]
    restart: unless-stopped
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${POSTGRES_USER:-postgres}
      interval: 30s
      timeout: 5s
      retries: 3
    logging: *default-logging
    volumes:
      - postgres-data:/var/lib/postgresql/data

  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    environment:
      BASE_URL: http://searxng:8080/
      INSTANCE_NAME: scorchcrawl-searxng
    ports:
      - "127.0.0.1:8080:8080"
    networks: [backend]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/status"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging: *default-logging

networks:
  backend:
    driver: bridge

volumes:
  redis-data:
  rabbitmq-data:
  postgres-data:
